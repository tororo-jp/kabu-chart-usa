name: Refresh Universe (Monthly)

on:
  schedule:
    # 1st of each month at 04:00 UTC
    - cron: '0 4 1 * *'

  workflow_dispatch:
    inputs:
      with_yfinance:
        description: 'Also fetch sectors via yfinance for non-S&P-1500 tickers (~2h)'
        required: false
        default: 'false'

jobs:
  refresh:
    runs-on: ubuntu-latest
    # 30 min for Wikipedia-only; up to 3h if with_yfinance=true
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Build universe (Wikipedia sectors)
        if: ${{ github.event.inputs.with_yfinance != 'true' }}
        run: python scanner/build_universe.py

      - name: Build universe (Wikipedia + yfinance sectors)
        if: ${{ github.event.inputs.with_yfinance == 'true' }}
        run: python scanner/build_universe.py --with-yfinance --yf-sleep 2.0

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          git diff --staged --quiet || \
            git commit -m "$(date +%Y-%m-%d) universe refreshed"
          git push
