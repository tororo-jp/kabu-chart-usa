name: Refresh Universe (Monthly)

on:
  schedule:
    # 1st of each month at 04:00 UTC
    - cron: '0 4 1 * *'

  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Build universe
        run: python scanner/build_universe.py --workers 8 --sleep 0.2

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/
          git diff --staged --quiet || \
            git commit -m "$(date +%Y-%m-%d) universe refreshed"
          git push
